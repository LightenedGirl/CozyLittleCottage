<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop — Cozy Little Cottage</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f6; --ink: #1a1a18; --muted: #6b6b65;
      --accent: #b07d4a; --accent-soft: #ddc9aa; --border: #e5e3dc;
      --heart: #e07070;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Lora', Georgia, serif; background: var(--bg); color: var(--ink); min-height: 100vh; line-height: 1.75; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,249,246,0.94); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 62px;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700;
      color: var(--ink); text-decoration: none; display: flex; align-items: center; gap: 0.45rem;
    }
    .nav-btn {
      background: none; border: none; font-family: 'Lora', serif;
      font-size: 0.82rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; padding: 0.45rem 1rem;
      border-radius: 2px; transition: color 0.2s, background 0.2s;
      text-decoration: none; display: inline-block;
    }
    .nav-btn:hover { color: var(--ink); background: var(--border); }
    .nav-btn.active { color: var(--ink); font-weight: 500; }

    /* ── PAGE HEADER ── */
    .shop-header {
      max-width: 620px; margin: 0 auto;
      padding: 4.5rem 2rem 3rem;
      text-align: center; border-bottom: 1px solid var(--border);
    }
    .shop-header .eyebrow {
      font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 1rem;
    }
    .shop-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem); line-height: 1.2; margin-bottom: 1rem;
    }
    .shop-header h1 em { font-style: italic; color: var(--accent); }
    .shop-header p { font-size: 0.95rem; color: var(--muted); max-width: 380px; margin: 0 auto; }

    /* ── PRODUCT FEED ── */
    .product-feed {
      max-width: 620px; margin: 0 auto;
      padding: 2rem 2rem 6rem;
      display: flex; flex-direction: column; gap: 2.5rem;
    }

    /* ── PRODUCT CARD ── */
    .product-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: box-shadow 0.25s;
    }
    .product-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.07); }

    .product-img {
      width: 100%; aspect-ratio: 16/9;
      background: linear-gradient(135deg, #ede9e0, #d8d3c6);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .product-img img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .product-img .img-placeholder {
      font-size: 3rem; opacity: 0.3;
    }

    /* Heart button on image */
    .heart-btn {
      position: absolute; top: 1rem; right: 1rem;
      background: rgba(255,255,255,0.9);
      border: none; border-radius: 50%;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: transform 0.2s, background 0.2s;
    }
    .heart-btn:hover { transform: scale(1.12); }
    .heart-btn.liked { background: #fff0f0; }

    .heart-icon { transition: transform 0.3s; display: inline-block; }
    .heart-btn.liked .heart-icon { transform: scale(1.2); }

    .product-info { padding: 1.6rem; }

    .product-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 1rem;
      margin-bottom: 0.7rem;
    }

    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; line-height: 1.3;
    }

    .product-price {
  font-family: 'Lora', serif;
  font-size: 1.2rem; color: var(--accent);
  white-space: nowrap; font-weight: 700;
}

    .product-cat {
      font-size: 0.68rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .product-desc {
      font-size: 0.92rem; color: var(--muted);
      margin-bottom: 1.4rem; line-height: 1.7;
    }

   .product-footer {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding-top: 1.2rem; border-top: 1px solid var(--border);
}
  .order-buttons {
  display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-end;
}

    .likes-count {
      font-size: 0.8rem; color: var(--muted);
      display: flex; align-items: center; gap: 0.3rem;
    }

    .order-btn {
      background: var(--accent); color: #fff;
      border: none; border-radius: 4px;
      font-family: 'Lora', serif;
      font-size: 0.8rem; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer;
      padding: 0.6rem 1.4rem;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none; display: inline-block;
    }
    .order-btn:hover { background: #96682f; transform: translateY(-1px); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 5rem 0; color: var(--muted);
    }
    .empty-state .icon { font-size: 2.2rem; margin-bottom: 1rem; display: block; opacity: 0.6; }
    .empty-state p { font-size: 0.95rem; font-style: italic; }
    
    footer { border-top: 1px solid var(--border); padding: 1.8rem 2rem; text-align: center; font-size: 0.76rem; color: var(--muted); letter-spacing: 0.05em; }
  
  .amazon-btn {
  background: #f07501;
  margin-top: 0.5rem;
}
.amazon-btn:hover { background: #c98500; }

  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">🌿 Cozy Little Cottage</a>
  <div>
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn active" href="shop.html">Shop</a>
  </div>
</nav>

<div class="shop-header">
  <p class="eyebrow">Handpicked with love</p>
  <h1>The <em>Little</em> Shop</h1>
  <p>A curated collection of cozy things. Like what you see? Drop us an email!</p>
</div>

<div class="product-feed" id="product-feed">
  <!-- Products rendered by JS -->
</div>

<footer>© 2025 Cozy Little Cottage &nbsp;·&nbsp; Hosted on GitHub Pages</footer>

<script>
  // ── YOUR EMAIL ─────────────────────────────────────────────────
  const YOUR_EMAIL = "cozylittlecottage87@email.com"; // ← change this to your email
  // ──────────────────────────────────────────────────────────────

  // ── ADD YOUR PRODUCTS HERE ────────────────────────────────────
  // To add a product, copy one block and fill in your details.
  // Leave image: "" if you don't have a photo yet.
  // ─────────────────────────────────────────────────────────────
  const products = [
    {
      name: "Handmade Soy Candle",
      cat: "Home",
     price: "₹450",
      desc: "A calming lavender soy candle, hand-poured in small batches. Burns for up to 40 hours.",
      image: "candle.jpg" , // upload the image to your repo and put filename here
      amazon: "https://www.amazon.in/your-product-link-here"
   }
    // {
    //   name: "Woven Basket",
    //   cat: "Decor",
    //   price: "₹850",
    //   desc: "Naturally dyed, hand-woven baskets perfect for storage or display.",
    //   image: ""
    // }
  ];

  // ── Likes stored in memory (resets on refresh) ──
  const likes = {};

  function renderProducts() {
    const feed = document.getElementById('product-feed');
    if (products.length === 0) {
      feed.innerHTML = `
        <div class="empty-state">
          <span class="icon">🛍️</span>
          <p>No products yet — something lovely is coming soon!</p>
        </div>`;
      return;
    }

    feed.innerHTML = products.map((p, i) => {
      likes[i] = likes[i] || 0;
      const imgContent = p.image
        ? `<img src="${p.image}" alt="${p.name}" />`
        : `<span class="img-placeholder">🌿</span>`;
      const subject = encodeURIComponent(`Order Enquiry: ${p.name}`);
      const body = encodeURIComponent(`Hi,\n\nI'm interested in ordering: ${p.name} (${p.price})\n\nPlease let me know the details.\n\nThank you!`);

      return `
        <div class="product-card" id="card-${i}">
          <div class="product-img">
            ${imgContent}
            <button class="heart-btn" id="heart-${i}" onclick="toggleLike(${i})" title="Like this">
              <span class="heart-icon">🤍</span>
            </button>
          </div>
          <div class="product-info">
            <p class="product-cat">${p.cat}</p>
            <div class="product-top">
              <div class="product-name">${p.name}</div>
              <div class="product-price">${p.price}</div>
            </div>
            <p class="product-desc">${p.desc}</p>
            <div class="product-footer">
              <span class="likes-count" id="likes-${i}">🤍 ${likes[i]} likes</span>
                 <div class="order-buttons">
  <a class="order-btn" href="mailto:${YOUR_EMAIL}?subject=${subject}&body=${body}">
    Order via Email
  </a>
  ${p.amazon ? `<a class="order-btn amazon-btn" href="${p.amazon}" target="_blank">Buy on Amazon</a>` : ''}
</div>
      </div>
          </div>
        </div>`;
    }).join('');
  }

  function toggleLike(i) {
    const btn = document.getElementById(`heart-${i}`);
    const isLiked = btn.classList.contains('liked');
    if (isLiked) {
      likes[i]--;
      btn.classList.remove('liked');
      btn.querySelector('.heart-icon').textContent = '🤍';
    } else {
      likes[i]++;
      btn.classList.add('liked');
      btn.querySelector('.heart-icon').textContent = '❤️';
    }
    document.getElementById(`likes-${i}`).textContent =
      `${likes[i] > 0 ? '❤️' : '🤍'} ${likes[i]} likes`;
  }

  renderProducts();
</script>
</body>
</html>
