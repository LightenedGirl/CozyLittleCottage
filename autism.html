<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Autism Space — Cozy Little Cottage</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f6; --ink: #1a1a18; --muted: #6b6b65;
      --accent: #5a8a6a; --accent-soft: #a8c8b4; --border: #e5e3dc;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Lora', Georgia, serif; background: var(--bg); color: var(--ink); min-height: 100vh; line-height: 1.75; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,249,246,0.94); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0.8rem 2rem;
      display: flex; flex-direction: column;
      align-items: center; gap: 0.5rem;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700;
      color: var(--ink); text-decoration: none; display: flex; align-items: center; gap: 0.45rem;
    }
    .nav-links { display: flex; align-items: center; gap: 0.2rem; flex-wrap: wrap; justify-content: center; }
    .nav-btn {
      background: none; border: none; font-family: 'Lora', serif;
      font-size: 0.82rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; padding: 0.45rem 1rem;
      border-radius: 2px; transition: color 0.2s, background 0.2s;
      text-decoration: none; display: inline-block;
    }
    .nav-btn:hover { color: var(--ink); background: var(--border); }
    .nav-btn.active { color: var(--ink); font-weight: 500; }

    /* ── PAGE TRANSITION ── */
    .page { display: none; }
    .page.active { display: block; animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

    /* ── HEADER ── */
    .page-header {
      max-width: 620px; margin: 0 auto;
      padding: 4.5rem 2rem 3rem;
      text-align: center; border-bottom: 1px solid var(--border);
    }
    .page-header .eyebrow {
      font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 1rem;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem); line-height: 1.2; margin-bottom: 1rem;
    }
    .page-header h1 em { font-style: italic; color: var(--accent); }
    .page-header p { font-size: 0.95rem; color: var(--muted); max-width: 420px; margin: 0 auto; }

    /* ── CATEGORY PILLS ── */
    .category-bar {
      max-width: 620px; margin: 0 auto;
      padding: 1.8rem 2rem 0;
      display: flex; gap: 0.6rem; flex-wrap: wrap;
    }
    .cat-pill {
      background: none; border: 1px solid var(--border);
      font-family: 'Lora', serif; font-size: 0.75rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); cursor: pointer;
      padding: 0.35rem 1rem; border-radius: 999px;
      transition: all 0.2s;
    }
    .cat-pill:hover { border-color: var(--accent); color: var(--accent); }
    .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── FEED ── */
    .posts-feed { max-width: 620px; margin: 0 auto; padding: 1.5rem 2rem 5rem; }

    .empty-state { text-align: center; padding: 5rem 0; color: var(--muted); }
    .empty-state .icon { font-size: 2.2rem; margin-bottom: 1rem; display: block; opacity: 0.6; }
    .empty-state p { font-size: 0.95rem; font-style: italic; }

    .feed-item {
      padding: 2.5rem 0; border-bottom: 1px solid var(--border);
      text-decoration: none; display: block; color: inherit; transition: opacity 0.2s;
    }
    .feed-item:hover { opacity: 0.7; }

    .feed-item .meta {
      font-size: 0.7rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 0.55rem;
    }
    .feed-item h2 {
      font-family: 'Playfair Display', serif; font-size: 1.45rem;
      line-height: 1.3; margin-bottom: 0.55rem; transition: color 0.2s;
    }
    .feed-item:hover h2 { color: var(--accent); }
    .feed-item .excerpt { font-size: 0.9rem; color: var(--muted); margin-bottom: 0.9rem; }
    .read-link { font-size: 0.74rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }

    /* ── ALL POSTS LIST ── */
    .list-header { max-width: 620px; margin: 0 auto; padding: 4rem 2rem 2.5rem; border-bottom: 1px solid var(--border); }
    .list-header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 0.4rem; }
    .list-header p { font-size: 0.9rem; color: var(--muted); }
    .list-body { max-width: 620px; margin: 0 auto; padding: 0 2rem 5rem; }
    .list-empty { text-align: center; padding: 4rem 0; font-style: italic; color: var(--muted); font-size: 0.93rem; }

    .list-item {
      display: flex; align-items: baseline; gap: 1.2rem;
      padding: 1.5rem 0; border-bottom: 1px solid var(--border);
      text-decoration: none; color: inherit; transition: opacity 0.2s;
    }
    .list-item:hover { opacity: 0.7; }
    .list-num { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--accent-soft); flex-shrink: 0; width: 2rem; }
    .list-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; line-height: 1.35; flex: 1; transition: color 0.2s; }
    .list-item:hover .list-title { color: var(--accent); }
    .list-date { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; flex-shrink: 0; }

    footer { border-top: 1px solid var(--border); padding: 1.8rem 2rem; text-align: center; font-size: 0.76rem; color: var(--muted); letter-spacing: 0.05em; }

    @media (max-width: 480px) { .list-item { flex-wrap: wrap; } .list-date { width: 100%; padding-left: 3.2rem; } }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">🌿 Cozy Little Cottage</a>
  <div class="nav-links">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="index.html">All Posts</a>
    <a class="nav-btn" href="shop.html">Shop</a>
    <a class="nav-btn active" href="autism.html">The Autism Space</a>
  </div>
</nav>

<!-- HOME VIEW -->
<div class="page active" id="page-home">
  <div class="page-header">
    <p class="eyebrow">A safe & understanding corner</p>
    <h1>The <em>Autism</em> Space</h1>
    <p>My experience Autism</p>
  </div>

  <!-- Category Filter -->
  <div class="category-bar">
    <button class="cat-pill active" onclick="filterPosts('All')">All</button>
    <button class="cat-pill" onclick="filterPosts('Awareness & Information')">Awareness & Information</button>
    <button class="cat-pill" onclick="filterPosts('Personal Stories')">Personal Stories</button>
    <button class="cat-pill" onclick="filterPosts('Tips & Resources')">Tips & Resources</button>
  </div>

  <div class="posts-feed" id="home-feed"></div>
</div>

<!-- ALL POSTS VIEW -->
<div class="page" id="page-blog">
  <div class="list-header">
    <h1>All Posts</h1>
    <p>Every post in The Autism Space, newest first.</p>
  </div>
  <div class="list-body" id="blog-list"></div>
</div>

<footer>© 2025 Cozy Little Cottage &nbsp;·&nbsp; Hosted on GitHub Pages</footer>

<script>
  // ── ADD YOUR POSTS HERE ──────────────────────────────────────────
  // cat must be one of:
  // "Awareness & Information" | "Personal Stories" | "Tips & Resources"
  // Add newest post at the TOP.
  // ────────────────────────────────────────────────────────────────
  const posts = [
    // {
    //   cat: "Personal Stories",
    //   title: "Our Journey With Autism",
    //   date: "April 21, 2025",
    //   excerpt: "A short teaser shown on the page.",
    //   file: "autism-1.html"
    // }
  ];

  let activeFilter = 'All';

  function renderHome(filter) {
    const feed = document.getElementById('home-feed');
    const filtered = filter === 'All' ? posts : posts.filter(p => p.cat === filter);

    if (filtered.length === 0) {
      feed.innerHTML = `
        <div class="empty-state">
          <span class="icon">💚</span>
          <p>No posts here yet — something thoughtful is on the way.</p>
        </div>`;
      return;
    }

    feed.innerHTML = filtered.map(p => `
      <a class="feed-item" href="${p.file}">
        <p class="meta">${p.cat} &nbsp;·&nbsp; ${p.date}</p>
        <h2>${p.title}</h2>
        <p class="excerpt">${p.excerpt}</p>
        <span class="read-link">Read more →</span>
      </a>`).join('');
  }

  function filterPosts(cat) {
    activeFilter = cat;
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    renderHome(cat);
  }

  function renderBlogList() {
    const list = document.getElementById('blog-list');
    if (posts.length === 0) {
      list.innerHTML = `<p class="list-empty">Nothing here yet — check back soon.</p>`;
      return;
    }
    list.innerHTML = posts.map((p, i) => `
      <a class="list-item" href="${p.file}">
        <div class="list-num">${String(i + 1).padStart(2, '0')}</div>
        <div class="list-title">${p.title}</div>
        <div class="list-date">${p.date}</div>
      </a>`).join('');
  }

  renderHome('All');
  renderBlogList();
</script>
</body>
</html>
