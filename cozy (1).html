<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cozy Little Cottage</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f6;
      --ink: #1a1a18;
      --muted: #6b6b65;
      --accent: #b07d4a;
      --accent-soft: #ddc9aa;
      --border: #e5e3dc;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.75;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,249,246,0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 62px;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--ink);
      cursor: pointer;
      user-select: none;
      display: flex; align-items: center; gap: 0.45rem;
    }

    .nav-btn {
      background: none; border: none;
      font-family: 'Lora', serif;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      padding: 0.45rem 1rem;
      border-radius: 2px;
      transition: color 0.2s, background 0.2s;
    }
    .nav-btn:hover { color: var(--ink); background: var(--border); }
    .nav-btn.active { color: var(--ink); font-weight: 500; }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; animation: fadeUp 0.35s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HOME HEADER ── */
    .home-header {
      max-width: 620px; margin: 0 auto;
      padding: 4.5rem 2rem 3rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .home-header .eyebrow {
      font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 1rem;
    }

    .home-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.2; margin-bottom: 1rem;
    }

    .home-header h1 em { font-style: italic; color: var(--accent); }

    .home-header p {
      font-size: 0.95rem; color: var(--muted);
      max-width: 380px; margin: 0 auto;
    }

    /* ── FEED ── */
    .posts-feed {
      max-width: 620px; margin: 0 auto;
      padding: 0 2rem 5rem;
    }

    .empty-state {
      text-align: center;
      padding: 5rem 0;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.2rem; margin-bottom: 1rem; display: block; opacity: 0.6; }
    .empty-state p { font-size: 0.95rem; font-style: italic; }

    .feed-item {
      padding: 2.5rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .feed-item:hover { opacity: 0.7; }

    .feed-item .meta {
      font-size: 0.7rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 0.55rem;
    }

    .feed-item h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem; line-height: 1.3;
      margin-bottom: 0.55rem;
      transition: color 0.2s;
    }
    .feed-item:hover h2 { color: var(--accent); }

    .feed-item .excerpt {
      font-size: 0.9rem; color: var(--muted); margin-bottom: 0.9rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .read-link {
      font-size: 0.74rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent);
      display: inline-flex; align-items: center; gap: 0.4rem;
    }

    /* ── ALL POSTS ── */
    .list-header {
      max-width: 620px; margin: 0 auto;
      padding: 4rem 2rem 2.5rem;
      border-bottom: 1px solid var(--border);
    }
    .list-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; margin-bottom: 0.4rem;
    }
    .list-header p { font-size: 0.9rem; color: var(--muted); }

    .list-body {
      max-width: 620px; margin: 0 auto;
      padding: 0 2rem 5rem;
    }

    .list-empty {
      text-align: center; padding: 4rem 0;
      font-style: italic; color: var(--muted); font-size: 0.93rem;
    }

    .list-item {
      display: flex; align-items: baseline; gap: 1.2rem;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: opacity 0.2s;
    }
    .list-item:hover { opacity: 0.7; }

    .list-num {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 700;
      color: var(--accent-soft); flex-shrink: 0; width: 2rem;
    }

    .list-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; line-height: 1.35; flex: 1;
      transition: color 0.2s;
    }
    .list-item:hover .list-title { color: var(--accent); }

    .list-date {
      font-size: 0.7rem; color: var(--muted);
      letter-spacing: 0.05em; flex-shrink: 0;
    }

    /* ── POST VIEW ── */
    .post-back-bar {
      max-width: 620px; margin: 0 auto;
      padding: 1.8rem 2rem 0;
    }

    .back-btn {
      background: none; border: none;
      font-family: 'Lora', serif;
      font-size: 0.78rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      cursor: pointer; display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0; transition: color 0.2s;
    }
    .back-btn:hover { color: var(--ink); }

    .post-wrap {
      max-width: 620px; margin: 0 auto;
      padding: 2.5rem 2rem 6rem;
    }

    .post-wrap .cat {
      font-size: 0.7rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 0.8rem;
    }

    .post-wrap h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      line-height: 1.2; margin-bottom: 0.8rem;
    }

    .post-wrap .byline {
      font-size: 0.78rem; color: var(--muted);
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .post-body p { font-size: 1rem; color: #2e2e2a; margin-bottom: 1.5rem; }
    .post-body h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; margin: 2.5rem 0 1rem;
    }
    .post-body blockquote {
      border-left: 3px solid var(--accent-soft);
      padding: 0.4rem 0 0.4rem 1.4rem;
      margin: 2rem 0; font-style: italic;
      color: var(--muted); font-size: 1.02rem;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.8rem 2rem;
      text-align: center;
      font-size: 0.76rem; color: var(--muted);
      letter-spacing: 0.05em;
    }

    @media (max-width: 480px) {
      .list-item { flex-wrap: wrap; gap: 0.5rem; }
      .list-date { width: 100%; padding-left: 3.2rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo" onclick="showPage('home')">
    🌿 Cozy Little Cottage
  </div>
  <div>
    <button class="nav-btn active" id="nav-home" onclick="showPage('home')">Home</button>
    <button class="nav-btn" id="nav-blog" onclick="showPage('blog')">All Posts</button>
  </div>
</nav>

<!-- ═══ HOME ═══ -->
<div class="page active" id="page-home">
  <div class="home-header">
    <p class="eyebrow">Welcome to the cottage</p>
    <h1>A <em>cozy</em> corner<br/>of the internet</h1>
    <p>Slow reads, warm thoughts, and little stories from everyday life.</p>
  </div>
  <div class="posts-feed" id="home-feed"></div>
</div>

<!-- ═══ ALL POSTS ═══ -->
<div class="page" id="page-blog">
  <div class="list-header">
    <h1>All Posts</h1>
    <p>Every post, newest first.</p>
  </div>
  <div class="list-body" id="blog-list"></div>
</div>

<!-- ═══ SINGLE POST ═══ -->
<div class="page" id="page-post">
  <div class="post-back-bar">
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>
  <div class="post-wrap" id="post-content"></div>
</div>

<footer>
  © 2025 Cozy Little Cottage &nbsp;·&nbsp; Hosted on GitHub Pages
</footer>

<script>
  // ── YOUR POSTS GO HERE ──────────────────────────────────────────────
  // When you want to add a post, copy the block below, fill it in,
  // and add it to the array. Newest post should be first in the list.
  //
  // {
  //   cat: "Life",                          // category label
  //   title: "My First Post",               // post title
  //   date: "April 14, 2025",               // display date
  //   excerpt: "A short teaser line.",      // shown in feed & list
  //   body: `<p>Your full content here.</p>` // full post HTML
  // },
  // ────────────────────────────────────────────────────────────────────
  const posts = [];

  // ── RENDER HOME FEED ──
  function renderHome() {
    const feed = document.getElementById('home-feed');
    if (posts.length === 0) {
      feed.innerHTML = `
        <div class="empty-state">
          <span class="icon">🍵</span>
          <p>No posts yet — pull up a chair, something's brewing.</p>
        </div>`;
      return;
    }
    feed.innerHTML = posts.map((p, i) => `
      <div class="feed-item" onclick="openPost(${i})">
        <p class="meta">${p.cat} &nbsp;·&nbsp; ${p.date}</p>
        <h2>${p.title}</h2>
        <p class="excerpt">${p.excerpt}</p>
        <span class="read-link">Read more →</span>
      </div>`).join('');
  }

  // ── RENDER ALL POSTS LIST ──
  function renderBlogList() {
    const list = document.getElementById('blog-list');
    if (posts.length === 0) {
      list.innerHTML = `<p class="list-empty">Nothing here yet — check back soon.</p>`;
      return;
    }
    list.innerHTML = posts.map((p, i) => `
      <div class="list-item" onclick="openPost(${i})">
        <div class="list-num">${String(i + 1).padStart(2, '0')}</div>
        <div class="list-title">${p.title}</div>
        <div class="list-date">${p.date}</div>
      </div>`).join('');
  }

  // ── NAVIGATION ──
  let previousPage = 'home';

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    if (name !== 'post') {
      const btn = document.getElementById('nav-' + name);
      if (btn) btn.classList.add('active');
      previousPage = name;
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function openPost(index) {
    const p = posts[index];
    document.getElementById('post-content').innerHTML = `
      <p class="cat">${p.cat}</p>
      <h1>${p.title}</h1>
      <p class="byline">${p.date}</p>
      <div class="post-body">${p.body}</div>
    `;
    showPage('post');
  }

  function goBack() { showPage(previousPage); }

  // ── INIT ──
  renderHome();
  renderBlogList();
</script>
</body>
</html>
